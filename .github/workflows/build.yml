name: Build

on:
  push:
    tags:
      - "v*"

jobs:
  build-css:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack and build CSS
        run: |
          corepack enable
          yarn install
          yarn build:css

      - name: Upload CSS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailwind-css
          path: web/static/css/tailwind.min.css
          retention-days: 1

  build:
    needs: build-css
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: quectel-rgmiid-linux-amd64
            binary_name: quectel-rgmiid
            asset_name: quectel-rgmiid-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: quectel-rgmiid-linux-arm64
            binary_name: quectel-rgmiid
            asset_name: quectel-rgmiid-linux-arm64
          - goos: linux
            goarch: arm
            goarm: "5"
            artifact_name: quectel-rgmiid-linux-armv5
            binary_name: quectel-rgmiid
            asset_name: quectel-rgmiid-linux-armv5
          - goos: windows
            goarch: amd64
            artifact_name: quectel-rgmiid-windows-amd64
            binary_name: quectel-rgmiid.exe
            asset_name: quectel-rgmiid-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: quectel-rgmiid-windows-arm64
            binary_name: quectel-rgmiid.exe
            asset_name: quectel-rgmiid-windows-arm64.exe
          - goos: darwin
            goarch: amd64
            artifact_name: quectel-rgmiid-darwin-amd64
            binary_name: quectel-rgmiid
            asset_name: quectel-rgmiid-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: quectel-rgmiid-darwin-arm64
            binary_name: quectel-rgmiid
            asset_name: quectel-rgmiid-darwin-arm64
          - goos: freebsd
            goarch: amd64
            artifact_name: quectel-rgmiid-freebsd-amd64
            binary_name: quectel-rgmiid
            asset_name: quectel-rgmiid-freebsd-amd64
          - goos: freebsd
            goarch: arm64
            artifact_name: quectel-rgmiid-freebsd-arm64
            binary_name: quectel-rgmiid
            asset_name: quectel-rgmiid-freebsd-arm64

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download CSS Artifact
        uses: actions/download-artifact@v4
        with:
          name: tailwind-css
          path: web/static/css

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          go build -o dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }} .
          mv dist/${{ matrix.artifact_name }}/${{ matrix.binary_name }} dist/${{ matrix.artifact_name }}/${{ matrix.asset_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}/${{ matrix.asset_name }}
