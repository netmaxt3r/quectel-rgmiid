<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quectel RGMII Control Panel</title>
    <!-- Compiled Tailwind CSS -->
    <link rel="stylesheet" href="/static/css/tailwind.min.css">
    <!-- HTMX (Local) -->
    <script src="/static/js/htmx.min.js"></script>
    <!-- Custom Fonts (Local) -->
    <link rel="stylesheet" href="/static/css/fonts.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style>
        .htmx-indicator {
            display: none !important;
        }

        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            display: block !important;
        }
    </style>
</head>

<body class="h-full flex flex-col antialiased" hx-indicator="#global-loading">
    <!-- Global Loading Indicator Bar -->
    <div id="global-loading"
        class="htmx-indicator fixed top-0 left-0 right-0 h-1 bg-gradient-to-r from-cyan-500 via-teal-400 to-indigo-500 z-50 animate-pulse">
    </div>
    <!-- Navbar -->
    <header class="border-b border-white/5 py-4 px-6 md:px-12 flex justify-between items-center glass-panel">
        <div class="flex items-center gap-3">
            <div
                class="h-10 w-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-indigo-500 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
                </svg>
            </div>
            <div>
                <h1
                    class="text-xl font-semibold tracking-wide bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-slate-400">
                    Quectel RM520 Panel</h1>
                <p class="text-xs text-slate-400">RGMII AT over TCP Daemon</p>
            </div>
        </div>

        <!-- Action bar -->
        <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block">
                <p class="text-xs text-slate-400">Modem Address</p>
                <p class="text-sm font-mono text-cyan-400" id="modem-addr-display">Connecting...</p>
            </div>
            <button id="refresh-btn" hx-get="/refresh?tab=status" hx-target="#tab-content" hx-swap="innerHTML"
                class="px-4 py-2 text-sm font-medium rounded-lg bg-slate-800 hover:bg-slate-700 active:scale-95 transition flex items-center gap-2 border border-white/5">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
                Refresh
            </button>
            {{ if .AuthEnabled }}
            <a href="/logout"
                class="px-4 py-2 text-sm font-medium rounded-lg bg-rose-950/40 hover:bg-rose-900/60 active:scale-95 transition flex items-center gap-2 border border-rose-500/20 text-rose-300">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
                </svg>
                Sign Out
            </a>
            {{ end }}
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 p-6 md:p-12 max-w-[1200px] w-full mx-auto flex flex-col gap-8 overflow-y-auto">
        <div class="flex flex-col gap-8">
            <!-- Navigation Tabs -->
            <div class="flex border-b border-white/5 pb-px gap-6 mb-2">
                <button id="tab-status-btn" hx-get="/api/status" hx-target="#tab-content" hx-swap="innerHTML"
                    hx-trigger="click"
                    onclick="document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('border-cyan-500', 'text-white', 'font-semibold'); b.classList.add('border-transparent', 'text-slate-400', 'font-medium') }); this.classList.add('border-cyan-500', 'text-white', 'font-semibold'); this.classList.remove('border-transparent', 'text-slate-400', 'font-medium'); document.getElementById('refresh-btn').setAttribute('hx-get', '/refresh?tab=status'); htmx.process(document.getElementById('refresh-btn'));"
                    class="tab-btn border-b-2 border-cyan-500 pb-3 text-sm font-semibold text-white px-1 transition-all duration-200 focus:outline-none">
                    Status
                </button>
                <button id="tab-sms-btn" hx-get="/api/sms" hx-target="#tab-content" hx-swap="innerHTML"
                    hx-trigger="click"
                    onclick="document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('border-cyan-500', 'text-white', 'font-semibold'); b.classList.add('border-transparent', 'text-slate-400', 'font-medium') }); this.classList.add('border-cyan-500', 'text-white', 'font-semibold'); this.classList.remove('border-transparent', 'text-slate-400', 'font-medium'); document.getElementById('refresh-btn').setAttribute('hx-get', '/refresh?tab=sms'); htmx.process(document.getElementById('refresh-btn'));"
                    class="tab-btn border-b-2 border-transparent pb-3 text-sm font-medium text-slate-400 hover:text-slate-200 px-1 transition-all duration-200 focus:outline-none">
                    SMS
                </button>
                <button id="tab-console-btn" hx-get="/api/console" hx-target="#tab-content" hx-swap="innerHTML"
                    hx-trigger="click"
                    onclick="document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('border-cyan-500', 'text-white', 'font-semibold'); b.classList.add('border-transparent', 'text-slate-400', 'font-medium') }); this.classList.add('border-cyan-500', 'text-white', 'font-semibold'); this.classList.remove('border-transparent', 'text-slate-400', 'font-medium'); document.getElementById('refresh-btn').setAttribute('hx-get', '/refresh?tab=console'); htmx.process(document.getElementById('refresh-btn'));"
                    class="tab-btn border-b-2 border-transparent pb-3 text-sm font-medium text-slate-400 hover:text-slate-200 px-1 transition-all duration-200 focus:outline-none">
                    Console
                </button>
                <button id="tab-settings-btn" hx-get="/api/settings" hx-target="#tab-content" hx-swap="innerHTML"
                    hx-trigger="click"
                    onclick="document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('border-cyan-500', 'text-white', 'font-semibold'); b.classList.add('border-transparent', 'text-slate-400', 'font-medium') }); this.classList.add('border-cyan-500', 'text-white', 'font-semibold'); this.classList.remove('border-transparent', 'text-slate-400', 'font-medium'); document.getElementById('refresh-btn').setAttribute('hx-get', '/refresh?tab=settings'); htmx.process(document.getElementById('refresh-btn'));"
                    class="tab-btn border-b-2 border-transparent pb-3 text-sm font-medium text-slate-400 hover:text-slate-200 px-1 transition-all duration-200 focus:outline-none">
                    Settings
                </button>
            </div>

            <!-- HTMX dynamic target container -->
            <div id="tab-content" hx-get="/api/status" hx-trigger="load" hx-swap="innerHTML"
                class="flex flex-col gap-8">
                <!-- Initial Loading skeleton -->
                <div class="glass-panel p-8 rounded-2xl flex flex-col items-center justify-center min-h-[300px]">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-cyan-500 mb-4"></div>
                    <p class="text-slate-400 animate-pulse">Loading dashboard telemetry...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-4 px-6 md:px-12 text-center text-xs text-slate-500 border-t border-white/5 glass-panel">
        Powered by Go + HTMX &bull; RM520 Series Management Interface
    </footer>

    <!-- Custom Glassmorphic Confirmation Modal -->
    <div id="confirm-modal"
        class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-950/60 backdrop-blur-sm transition-all duration-300 opacity-0">
        <div
            class="glass-panel max-w-md w-full mx-4 p-6 rounded-3xl border border-white/10 shadow-2xl scale-95 transition-all duration-300">
            <div class="flex items-center gap-3 text-rose-400 mb-4">
                <div
                    class="h-10 w-10 rounded-xl bg-rose-500/10 border border-rose-500/20 flex items-center justify-center">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 9v3.75m-9.303 3.376C1.83 15.018 1.83 14 2.87 14h18.26c1.04 0 1.68 1.018 1.16 1.976l-9.13 16.74c-.52.955-1.92.955-2.44 0l-9.13-16.74ZM12 17.25h.008v.008H12v-.008Z" />
                    </svg>
                </div>
                <h3 class="text-lg font-bold tracking-wide">Confirm Action</h3>
            </div>
            <p id="confirm-modal-message" class="text-slate-300 text-sm mb-6 leading-relaxed">Are you sure you want to
                proceed?</p>
            <div class="flex justify-end gap-3">
                <button id="confirm-modal-cancel"
                    class="px-4 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm font-medium border border-white/5 active:scale-95 transition">
                    Cancel
                </button>
                <button id="confirm-modal-ok"
                    class="px-5 py-2.5 rounded-xl bg-rose-600 hover:bg-rose-500 text-white text-sm font-medium active:scale-95 transition">
                    Confirm
                </button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'rgmii_cmd_history';

        function getHistory() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch (e) {
                return [];
            }
        }

        function saveHistory(history) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        function saveCommandToHistory(cmd) {
            let history = getHistory();
            history = history.filter(c => c !== cmd);
            history.unshift(cmd);
            if (history.length > 50) {
                history = history.slice(0, 50);
            }
            saveHistory(history);
            renderHistory();
        }

        function removeFromHistory(cmd, event) {
            if (event) {
                event.stopPropagation();
            }
            let history = getHistory();
            history = history.filter(c => c !== cmd);
            saveHistory(history);
            renderHistory();
        }

        function clearHistory() {
            if (confirm('Are you sure you want to clear all command history?')) {
                saveHistory([]);
                renderHistory();
            }
        }

        function renderHistory() {
            const container = document.getElementById('command-history-container');
            if (!container) return;

            const history = getHistory();
            if (history.length === 0) {
                container.innerHTML = '<span class="text-xs text-slate-600 italic">No command history yet.</span>';
                return;
            }

            container.innerHTML = '';
            history.forEach(cmd => {
                const item = document.createElement('div');
                item.className = "flex items-center justify-between group bg-slate-900/40 hover:bg-slate-900 border border-white/5 rounded-xl px-3 py-1.5 transition text-xs font-mono";

                const span = document.createElement('span');
                span.className = "text-slate-300 hover:text-cyan-400 cursor-pointer truncate flex-1 mr-2";
                span.textContent = cmd;
                span.addEventListener('click', () => fillCommand(cmd));

                const button = document.createElement('button');
                button.type = "button";
                button.className = "text-slate-500 hover:text-rose-400 active:scale-95 transition text-[16px] font-bold px-1 line-none leading-none select-none";
                button.innerHTML = "&times;";
                button.title = "Remove from history";
                button.addEventListener('click', (event) => removeFromHistory(cmd, event));

                item.appendChild(span);
                item.appendChild(button);
                container.appendChild(item);
            });
        }

        function fillCommand(cmd) {
            document.getElementById('cmd-input').value = cmd;
            document.getElementById('cmd-input').focus();
        }

        function clearConsole() {
            document.getElementById('console-output').innerHTML = '';
        }

        function scrollTerminalBottom() {
            const consoleBox = document.getElementById('console-output');
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        // Initialize history and form listeners on HTMX load
        document.body.addEventListener('htmx:load', function (evt) {
            const form = document.getElementById('console-form');
            if (form && !form.dataset.initialized) {
                form.dataset.initialized = 'true';
                renderHistory();
                form.addEventListener('submit', () => {
                    const cmdInput = document.getElementById('cmd-input');
                    if (cmdInput) {
                        const cmd = cmdInput.value.trim();
                        if (cmd) {
                            saveCommandToHistory(cmd);
                        }
                    }
                });
            }
        });

        // Catch the response from HTMX, print it nicely, and auto-scroll
        document.body.addEventListener('htmx:afterOnLoad', function (evt) {
            if (evt.detail.target.id === 'console-output') {
                scrollTerminalBottom();
            }
        });

        // Set modem address dynamically when fetched from status
        document.body.addEventListener('htmx:responseError', function (evt) {
            console.error('Request failed:', evt.detail.xhr);
        });

        // Monitor background status updates to set modem address header
        document.body.addEventListener('htmx:afterSettle', function (evt) {
            if (evt.detail.target.id === 'tab-content') {
                const addr = document.getElementById('modem-addr-field');
                if (addr) {
                    document.getElementById('modem-addr-display').innerText = addr.value;
                }
            }
        });

        // Custom Confirmation Modal Logic
        let confirmCallback = null;

        function showCustomConfirm(message, callback) {
            confirmCallback = callback;
            const modal = document.getElementById('confirm-modal');
            const messageEl = document.getElementById('confirm-modal-message');

            messageEl.textContent = message;

            // Show modal with animation
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                const dialog = modal.querySelector('.glass-panel');
                if (dialog) {
                    dialog.classList.remove('scale-95');
                }
            }, 10);
        }

        function closeConfirmModal() {
            const modal = document.getElementById('confirm-modal');
            const dialog = modal.querySelector('.glass-panel');

            modal.classList.add('opacity-0');
            dialog.classList.add('scale-95');

            setTimeout(() => {
                modal.classList.add('hidden');
                confirmCallback = null;
            }, 300);
        }

        document.getElementById('confirm-modal-cancel').addEventListener('click', closeConfirmModal);
        document.getElementById('confirm-modal-ok').addEventListener('click', () => {
            if (confirmCallback) {
                confirmCallback();
            }
            closeConfirmModal();
        });

        // Add HTMX confirmation handler
        document.body.addEventListener('htmx:confirm', function (evt) {
            if (!evt.detail.question) {
                return;
            }
            // Prevent default browser confirm
            evt.preventDefault();

            showCustomConfirm(evt.detail.question, function () {
                evt.detail.issueRequest(true);
            });
        });
    </script>
</body>

</html>
