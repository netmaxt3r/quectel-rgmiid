<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quectel RGMII Panel</title>
    <!-- Compiled Tailwind CSS -->
    <link rel="stylesheet" href="/static/css/tailwind.min.css">
    <!-- Custom Fonts (Local) -->
    <link rel="stylesheet" href="/static/css/fonts.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/favicon.png">
</head>
<body class="h-full flex flex-col items-center justify-center p-6 antialiased">
    <div class="w-full max-w-md glass-panel rounded-3xl p-8 relative overflow-hidden flex flex-col shadow-2xl">
        <!-- Glowing background accent -->
        <div class="absolute -top-12 -right-12 h-32 w-32 bg-indigo-500/10 blur-3xl rounded-full"></div>
        <div class="absolute -bottom-12 -left-12 h-32 w-32 bg-cyan-500/10 blur-3xl rounded-full"></div>

        <div class="flex flex-col items-center mb-8 relative z-10">
            <div class="h-12 w-12 rounded-2xl bg-gradient-to-tr from-cyan-500 to-indigo-500 flex items-center justify-center shadow-lg shadow-cyan-500/20 mb-4">
                <svg class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-wide bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-slate-400">RGMII Control Panel</h1>
            <p class="text-xs text-slate-400 mt-1">Please sign in to access your modem dashboard</p>
        </div>

        {{ if .Error }}
        <div class="mb-6 p-4 rounded-xl bg-rose-500/10 border border-rose-500/25 text-rose-400 text-sm flex items-center gap-2">
            <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
            </svg>
            <span>{{ .Error }}</span>
        </div>
        {{ end }}

        <form action="/login" method="POST" class="flex flex-col gap-5 relative z-10">
            <div class="flex flex-col gap-1.5">
                <label for="username" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Username</label>
                <input 
                    type="text" 
                    name="username" 
                    id="username" 
                    placeholder="Enter username"
                    required 
                    autocomplete="username"
                    class="bg-slate-900/80 border border-white/10 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition placeholder-slate-500"
                >
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="password" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
                <input 
                    type="password" 
                    name="password" 
                    id="password" 
                    placeholder="Enter password"
                    required 
                    autocomplete="current-password"
                    class="bg-slate-900/80 border border-white/10 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition placeholder-slate-500"
                >
            </div>

            <button 
                type="submit" 
                class="w-full mt-2 py-3 rounded-xl bg-gradient-to-r from-cyan-600 to-indigo-600 hover:from-cyan-500 hover:to-indigo-500 active:scale-[0.98] transition font-semibold text-sm flex items-center justify-center shadow-lg shadow-cyan-500/10"
            >
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
